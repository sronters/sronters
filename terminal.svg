<svg xmlns="http://www.w3.org/2000/svg" width="860" height="620" viewBox="0 0 860 620">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow border -->
  <rect x="2" y="2" width="856" height="616" rx="12" ry="12"
        fill="none" stroke="#00FF41" stroke-width="2.5"
        filter="url(#glow-strong)" opacity="0.9"/>

  <!-- Terminal background -->
  <rect x="2" y="2" width="856" height="616" rx="12" ry="12" fill="#0a0a0a"/>

  <!-- Title bar -->
  <rect x="2" y="2" width="856" height="38" rx="12" ry="12" fill="#111111"/>
  <rect x="2" y="26" width="856" height="14" fill="#111111"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="21" r="7" fill="#FF5F57"/>
  <circle cx="50" cy="21" r="7" fill="#FEBC2E"/>
  <circle cx="72" cy="21" r="7" fill="#28C840"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle"
        font-family="Courier New, monospace" font-size="13" fill="#00FF41"
        filter="url(#glow)">sronters@fsociety: ~</text>

  <!-- ─── whoami ─── -->
  <text x="28" y="66" font-family="Courier New, monospace" font-size="14">
    <tspan fill="#00FF41" filter="url(#glow)">sronters@fsociety:~$ </tspan>
    <tspan fill="#00FF41" font-weight="bold">whoami</tspan>
  </text>
  <text x="28" y="88" font-family="Courier New, monospace" font-size="14" fill="#00CC33">
    Baktiyar Ablaikhan  |  AI &amp; Satellite Systems Engineer  |  Astana, KZ
  </text>

  <!-- ─── cat identity.json ─── -->
  <text x="28" y="118" font-family="Courier New, monospace" font-size="14">
    <tspan fill="#00FF41" filter="url(#glow)">sronters@fsociety:~$ </tspan>
    <tspan fill="#00FF41" font-weight="bold">cat identity.json</tspan>
  </text>
  <text x="28" y="140" font-family="Courier New, monospace" font-size="13" fill="#009922">&gt; grade    :  9th — NIS Astana Nura</text>
  <text x="28" y="158" font-family="Courier New, monospace" font-size="13" fill="#009922">&gt; focus    :  Satellite Intelligence · Edge AI · Neural Networks</text>
  <text x="28" y="176" font-family="Courier New, monospace" font-size="13" fill="#009922">&gt; motive   :  "The world itself is just one big machine." — Elliot</text>

  <!-- ─── cat expertise.json ─── -->
  <text x="28" y="208" font-family="Courier New, monospace" font-size="14">
    <tspan fill="#00FF41" filter="url(#glow)">sronters@fsociety:~$ </tspan>
    <tspan fill="#00FF41" font-weight="bold">cat expertise.json</tspan>
  </text>

  <!-- Section: AI / ML -->
  <text x="28" y="232" font-family="Courier New, monospace" font-size="14" fill="#00FF41" font-weight="bold" filter="url(#glow)">=== AI / ML &amp; Computer Vision ===</text>
  <text x="28" y="252" font-family="Courier New, monospace" font-size="13" fill="#00CC33">PyTorch, Scikit-learn, HuggingFace, YOLOv8-OBB, U-Net (ResNet-34)</text>
  <text x="28" y="270" font-family="Courier New, monospace" font-size="13" fill="#00CC33">XGBoost, LSTM, Qwen-2.5-VL-72B, Geospatial AI, Multimodal Systems</text>

  <!-- Section: Programming -->
  <text x="28" y="298" font-family="Courier New, monospace" font-size="14" fill="#00FF41" font-weight="bold" filter="url(#glow)">=== Programming Languages ===</text>
  <text x="28" y="318" font-family="Courier New, monospace" font-size="13" fill="#00CC33">Python, C++, Pure C (m2cgen transpilation), HTML/CSS, Bash/Linux</text>

  <!-- Section: Data & Deployment -->
  <text x="28" y="346" font-family="Courier New, monospace" font-size="14" fill="#00FF41" font-weight="bold" filter="url(#glow)">=== Data Science &amp; Deployment ===</text>
  <text x="28" y="366" font-family="Courier New, monospace" font-size="13" fill="#00CC33">Pandas, NumPy, Matplotlib, FastAPI, Streamlit, Jupyter, Kaggle</text>
  <text x="28" y="384" font-family="Courier New, monospace" font-size="13" fill="#00CC33">Leaflet.js, Satellite Data Processing (Optical + SAR)</text>

  <!-- Section: Hardware -->
  <text x="28" y="412" font-family="Courier New, monospace" font-size="14" fill="#00FF41" font-weight="bold" filter="url(#glow)">=== Edge AI &amp; Hardware ===</text>
  <text x="28" y="432" font-family="Courier New, monospace" font-size="13" fill="#00CC33">ESP32-S3, Arduino, MPU6050, AD8232, MAX30102, RTOS, m2cgen</text>

  <!-- ─── ./decrypt_reality.sh ─── -->
  <text x="28" y="464" font-family="Courier New, monospace" font-size="14">
    <tspan fill="#00FF41" filter="url(#glow)">sronters@fsociety:~$ </tspan>
    <tspan fill="#00FF41" font-weight="bold">./decrypt_reality.sh</tspan>
  </text>
  <text x="28" y="486" font-family="Courier New, monospace" font-size="13" fill="#009922">
    decrypting... control is an illusion.
  </text>

  <!-- ─── git log ─── -->
  <text x="28" y="516" font-family="Courier New, monospace" font-size="14">
    <tspan fill="#00FF41" filter="url(#glow)">sronters@fsociety:~$ </tspan>
    <tspan fill="#00FF41" font-weight="bold">git log --oneline --active</tspan>
  </text>
  <text x="28" y="536" font-family="Courier New, monospace" font-size="13" fill="#00CC33">a1b2c3d  TRACE     — Multimodal Satellite Intelligence Platform</text>
  <text x="28" y="554" font-family="Courier New, monospace" font-size="13" fill="#00CC33">d4e5f6a  EpiCare   — Real-Time Edge AI Seizure Detection</text>
  <text x="28" y="572" font-family="Courier New, monospace" font-size="13" fill="#00CC33">7g8h9i0  SunCast   — LSTM Solar Flare Prediction Pipeline</text>

  <!-- ─── final prompt ─── -->
  <text x="28" y="602" font-family="Courier New, monospace" font-size="14">
    <tspan fill="#00FF41" filter="url(#glow)">sronters@fsociety:~$ </tspan>
    <tspan fill="#00FF41" filter="url(#glow)">█</tspan>
  </text>
</svg>
