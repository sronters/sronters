<svg xmlns="http://www.w3.org/2000/svg" width="860" height="940" viewBox="0 0 860 940">
  <defs>
    <style>
      .bg { fill: #0a0a0a; }
      .titlebar { fill: #1a1a1a; }
      .title { font-family: 'Courier New', monospace; font-size: 13px; fill: #888888; }
      .dot-r { fill: #FF5F57; }
      .dot-y { fill: #FEBC2E; }
      .dot-g { fill: #28C840; }
      .prompt { font-family: 'Courier New', monospace; font-size: 13px; fill: #00FF41; }
      .red { font-family: 'Courier New', monospace; font-size: 13px; fill: #FF0000; }
      .white { font-family: 'Courier New', monospace; font-size: 13px; fill: #CCCCCC; }
      .dim { font-family: 'Courier New', monospace; font-size: 13px; fill: #666666; }
      .cyan { font-family: 'Courier New', monospace; font-size: 13px; fill: #00CCCC; }
      .yellow { font-family: 'Courier New', monospace; font-size: 12px; fill: #FFD700; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="860" height="940" rx="10" ry="10" class="bg"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="860" height="32" rx="10" ry="10" class="titlebar"/>
  <rect x="0" y="16" width="860" height="16" class="titlebar"/>

  <!-- Traffic light dots -->
  <circle cx="20" cy="16" r="6" class="dot-r"/>
  <circle cx="40" cy="16" r="6" class="dot-y"/>
  <circle cx="60" cy="16" r="6" class="dot-g"/>

  <!-- Title bar text -->
  <text x="430" y="21" text-anchor="middle" class="title">sronters@fsociety: ~</text>

  <!-- Content starts at y=50, each line ~18px -->

  <!-- ASCII HEADER -->
  <text x="30" y="62" class="red"> ______   _______  _______  _______  _________</text>
  <text x="30" y="80" class="red">(  __  \ (  ____ \(  ____ \(  ___  )\__   __/</text>
  <text x="30" y="98" class="red">| (  \  )| (    \/| (    \/| (   ) |   ) (   </text>
  <text x="30" y="116" class="red">| |   ) || (__    | |      | |   | |   | |   </text>
  <text x="30" y="134" class="red">| |   | ||  __)   | |      | |   | |   | |   </text>
  <text x="30" y="152" class="red">| |   ) || (      | |      | |   | |   | |   </text>
  <text x="30" y="170" class="red">| (__/  )| (____/\| (____/\| (___) |   | |   </text>
  <text x="30" y="188" class="red">(______/ (_______/(_______/(_______)   )_(   </text>

  <!-- Divider -->
  <text x="30" y="210" class="dim">────────────────────────────────────────────────────────────</text>

  <!-- Session block -->
  <text x="30" y="230" class="red">        }------{+} Session Established {+}------{</text>
  <text x="30" y="248" class="red">        }--------{+}   USER: sronters   {+}------{</text>
  <text x="30" y="266" class="red">        }------{+} Encryption: ACTIVE   {+}------{</text>

  <!-- Divider -->
  <text x="30" y="285" class="dim">────────────────────────────────────────────────────────────</text>

  <!-- whoami -->
  <text x="30" y="305"><tspan class="prompt">fsociety~# </tspan><tspan class="white">whoami</tspan></text>
  <text x="30" y="323" class="white">&gt; Baktiyar Ablaikhan  |  Astana, KZ  |  Grade 9 @ NIS</text>
  <text x="30" y="341" class="dim">&gt; "The world itself is just one big machine. You know? Machines</text>
  <text x="30" y="359" class="dim">&gt;  never have any extra parts. They have the exact amount they</text>
  <text x="30" y="377" class="dim">&gt;  need." — Elliot Alderson</text>

  <!-- Divider -->
  <text x="30" y="396" class="dim">────────────────────────────────────────────────────────────</text>

  <!-- Menu -->
  <text x="30" y="416"><tspan class="prompt">fsociety~# </tspan><tspan class="white">./menu --list</tspan></text>
  <text x="30" y="434" class="red">    {1}--Satellite Intelligence</text>
  <text x="30" y="452" class="red">    {2}--Edge AI Systems</text>
  <text x="30" y="470" class="red">    {3}--Neural Networks</text>
  <text x="30" y="488" class="red">    {4}--Signal Processing</text>
  <text x="30" y="506" class="red">    {5}--Anomaly Detection</text>
  <text x="30" y="524" class="red">    {6}--LLM Research</text>
  <text x="30" y="542" class="red">    {7}--Embedded Systems / Edge AI</text>
  <text x="30" y="560" class="red">    {8}--Post Exploitation of Reality</text>
  <text x="30" y="578" class="red">    {0}--INSTALL &amp; UPDATE the world</text>
  <text x="30" y="596" class="red">    {99}-Exit</text>

  <!-- Prompt cursor -->
  <text x="30" y="618"><tspan class="prompt">fsociety~# </tspan><tspan class="prompt">█</tspan></text>

  <!-- Divider -->
  <text x="30" y="636" class="dim">────────────────────────────────────────────────────────────</text>

  <!-- motd -->
  <text x="30" y="656"><tspan class="prompt">fsociety~# </tspan><tspan class="white">cat /etc/motd</tspan></text>
  <text x="30" y="674" class="dim">  "I wanted to save the world."</text>
  <text x="30" y="692" class="dim">  "So did I."</text>
  <text x="30" y="710" class="dim">  — Mr. Robot, Season 1</text>

  <!-- Divider -->
  <text x="30" y="728" class="dim">────────────────────────────────────────────────────────────</text>

  <!-- skill_tree -->
  <text x="30" y="748"><tspan class="prompt">fsociety~# </tspan><tspan class="white">cat ~/.skill_tree</tspan></text>

  <!-- Row 1: Languages -->
  <text x="30" y="766" class="cyan">[LANGUAGES]</text>
  <text x="30" y="784" class="yellow">  Python   C++   Pure C   Linux/Ubuntu   HTML/CSS</text>

  <!-- Row 2: AI/ML -->
  <text x="30" y="804" class="cyan">[AI / ML]</text>
  <text x="30" y="822" class="yellow">  PyTorch   Scikit-learn   HuggingFace   YOLOv8-OBB   U-Net</text>
  <text x="30" y="840" class="yellow">  XGBoost   LSTM   Qwen-2.5-VL-72B   NLP   Geospatial AI</text>

  <!-- Row 3: Data -->
  <text x="30" y="858" class="cyan">[DATA / DEPLOY]</text>
  <text x="30" y="876" class="yellow">  Pandas   NumPy   Matplotlib   FastAPI   Streamlit   Leaflet.js</text>

  <!-- Row 4: Hardware -->
  <text x="30" y="896" class="cyan">[HARDWARE / EDGE]</text>
  <text x="30" y="914" class="yellow">  ESP32-S3   Arduino   MPU6050   AD8232   MAX30102   m2cgen</text>

  <!-- Final prompt -->
  <text x="30" y="932"><tspan class="prompt">fsociety~# </tspan><tspan class="prompt">█</tspan></text>
</svg>
